<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade Flexbox e Grid</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1> Atividade - Flexbox e Grid</h1>

    <!-- Exercício 1 -->
     <section class="ex1">
        <div class="navbar">
            <div class="logo">Logo </div>
            
            <div class="menu">
                <a>Home</a>
                <a>About</a>
                <a>Services</a>
            </div>

            <button class="contact">Contact</button>
        </div>
     </section>

        <!-- Exercício 2 -->
        <section class="ex2">
            <div class="cards">
                <div class="card 1"></div>
                <div class="card 2"></div>
                <div class="card 3"></div>
                <div class="card 4"></div>
                <div class="card 5"></div>
                <div class="card 6"></div>
                <div class="card 7"></div>
                <div class="card 8"></div>
                <div class="card 9"></div>
                <div class="card 10"></div>
                <div class="card 11"></div>
                <div class="card 12"></div>
            </div>
        </section>

        <!-- Exercício 3 -->
        <section class="ex3">
            <div class="grid-galeria">
                <div class="item1">Imagem 1</div>
                <div class="item2">Imagem 2</div>
                <div class="item3">Imagem 3</div>
                <div class="item4">Imagem 4</div>
            </div>
            
        </section>

        <!-- Exercício 4 -->
        <section class="ex4">
            <div class="grid-areas">
                <header>Header</header>
                <aside>Aside</aside>
                <main>Main</main>
                <footer>Footer</footer>
            </div>
        </section>
        
        <!-- Exercício 5 -->
         <section class="ex5">
            <div class="layout">
                <header>Header</header>

                <div class="content">
                <div class="box">1</div>
                <div class="box">2</div>
                <div class="box">3</div>
                </div>

                <footer>Footer</footer>
            </div>
            
         </section>
</body>

</html>
